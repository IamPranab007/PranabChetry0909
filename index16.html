<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Resources Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:#020617;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:240px;
    background:#020617;
    border-right:1px solid rgba(255,255,255,.08);
    padding:20px;
}

.sidebar h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

.sidebar button{
    width:100%;
    margin-bottom:10px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.sidebar button:hover{
    background:linear-gradient(135deg,#6366f1,#38bdf8);
}

/* Main Content */
.main{
    flex:1;
    padding:25px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2.4rem;
    background:linear-gradient(90deg,#38bdf8,#6366f1,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

.card{
    background:rgba(255,255,255,.05);
    padding:18px;
    border-radius:16px;
    transition:.4s;
    box-shadow:0 0 25px rgba(0,0,0,.6);
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:0 0 35px rgba(56,189,248,.6);
}

.card h3{
    color:#38bdf8;
    margin-bottom:8px;
}

.card p{
    font-size:.9rem;
    color:#ccc;
}

.card a{
    display:inline-block;
    margin-top:10px;
    padding:8px 18px;
    border-radius:10px;
    background:linear-gradient(135deg,#7c3aed,#9333ea);
    color:white;
    text-decoration:none;
    transition:.3s;
}

.card a:hover{
    background:linear-gradient(135deg,#2563eb,#38bdf8);
}

/* Mobile */
@media(max-width:850px){
    .container{flex-direction:column;}
    .sidebar{width:100%;display:flex;overflow-x:auto;}
    .sidebar button{min-width:140px;margin-right:8px;}
}
</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h2>📚 Resources</h2>
<button onclick="show('notes')">Notes</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('guides')">Exam Guides</button>
<button onclick="show('pdfs')">PDF Vault</button>
<button onclick="show('revision')">Quick Revision</button>
</div>

<!-- Main Content -->
<div class="main">

<div class="header">
<h1>Premium Study Resources Hub</h1>
<p>All-in-one learning platform</p>
</div>

<div id="content" class="grid"></div>

</div>
</div>

<script>
const data={
notes:[
{title:"Physics Notes",desc:"Concept-wise premium notes"},
{title:"Chemistry Notes",desc:"Organic, Inorganic, Physical"},
{title:"Maths Notes",desc:"Formulas + solved examples"},
{title:"Biology Notes",desc:"Diagrams + explanations"}
],

videos:[
{title:"Physics Video Lectures",desc:"Concept clarity + problems"},
{title:"Maths One Shot",desc:"Fast revision videos"},
{title:"Chemistry Crash Course",desc:"Exam focused learning"},
{title:"Biology Concept Videos",desc:"Diagram based learning"}
],

guides:[
{title:"30 Days Study Plan",desc:"Complete exam roadmap"},
{title:"15 Days Revision Plan",desc:"Rapid revision strategy"},
{title:"Night Before Exam Guide",desc:"Last moment prep"},
{title:"Topper Study Strategy",desc:"Learn from toppers"}
],

pdfs:[
{title:"Formula Sheets",desc:"All subjects formulas"},
{title:"Previous Year Papers",desc:"Solved question papers"},
{title:"Worksheets",desc:"Practice material"},
{title:"Sample Papers",desc:"Mock tests"}
],

revision:[
{title:"One Page Revision",desc:"Chapter summary"},
{title:"Important Questions",desc:"Most expected Qs"},
{title:"Mind Maps",desc:"Visual learning"},
{title:"Key Concepts",desc:"Rapid understanding"}
]
};

function show(type){
    let html="";
    data[type].forEach(item=>{
        html+=`
        <div class="card">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <a href="#">OPEN</a>
        </div>`;
    });
    document.getElementById("content").innerHTML=html;
}

show('notes');
</script>

</body>
</html>
