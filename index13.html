<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Average Marks Calculator</title>

<style>
:root{
  --bg:#070b16;
  --card:#10162b;
  --accent:#7c4dff;
  --hover:#2196f3;
  --text:#e8eaf6;
  --muted:#9aa0c7;
}

*{box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

body{
  margin:0;
  background:radial-gradient(circle at top,#11183a,#05070f);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.card{
  background:rgba(16,22,43,0.9);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:25px;
  width:100%;
  max-width:420px;
  box-shadow:0 20px 45px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  font-weight:600;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #1f2450;
  background:#070b16;
  color:var(--text);
  font-size:16px;
  outline:none;
  margin-bottom:12px;
}

input:focus{border-color:var(--accent);}

button{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--hover));
  color:white;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.03);}

.result{
  margin-top:20px;
  font-size:28px;
  font-weight:600;
}

.subjects{
  margin-bottom:15px;
}

.add{
  background:transparent;
  border:1px dashed var(--accent);
  color:var(--accent);
}

.add:hover{
  background:rgba(124,77,255,0.1);
}

.remove{
  background:#f44336;
}

.row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  margin-bottom:8px;
}
.pb-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #ffffff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 35px rgba(124, 58, 237, 0.45);
  transition: all 0.35s ease;
}

/* Hover → Blue */
.pb-btn:hover {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  box-shadow: 0 12px 40px rgba(56, 189, 248, 0.6);
  transform: translateY(-2px);
}

/* Click */
.pb-btn:active {
  transform: scale(0.97);
}
</style>
</head>
<a class="pb-btn" href="index2.html">← Back</a>
<body>

<div class="card">
  <h1>📐 Average Marks Calculator</h1>

  <div id="subjects" class="subjects"></div>

  <button class="add" onclick="addSubject()">➕ Add Marks</button>
  <br><br>
  <button onclick="calculate()">Calculate Average</button>

  <div class="result" id="result">Average: 0</div>
</div>

<script>
const subjects=document.getElementById("subjects");

function addSubject(){
  const div=document.createElement("div");
  div.className="row";
  div.innerHTML=`
    <input type="number" placeholder="Enter marks">
    <button class="remove" onclick="this.parentElement.remove()">✖</button>
  `;
  subjects.appendChild(div);
}

addSubject();
addSubject();

function calculate(){
  let total=0,count=0;

  document.querySelectorAll("#subjects input").forEach(input=>{
    const val=parseFloat(input.value);
    if(!isNaN(val)){
      total+=val;
      count++;
    }
  });

  if(count===0)return;

  const avg=total/count;
  document.getElementById("result").innerText="Average: "+avg.toFixed(2);
}
</script>

</body>
</html>
