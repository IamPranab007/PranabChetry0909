<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Score Estimator – God Mode</title>

<style>
:root{
  --bg:#03040c;
  --card:#0c1025;
  --accent:#7c4dff;
  --hover:#00c6ff;
  --text:#ffffff;
  --muted:#9aa0c7;
  --glow:0 0 25px rgba(124,77,255,0.6);
}

*{
  box-sizing:border-box;
  font-family:"Segoe UI",system-ui,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#0f1b55,#03040c);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.app{
  width:100%;
  max-width:1100px;
  background:linear-gradient(135deg,#0b1030,#050818);
  border-radius:22px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  border:1px solid rgba(124,77,255,0.15);
}

h1{
  text-align:center;
  font-size:2.4rem;
  letter-spacing:1px;
  margin-bottom:25px;
  background:linear-gradient(90deg,var(--accent),var(--hover));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.card{
  background:rgba(15,20,50,0.85);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  box-shadow:inset 0 0 0 1px rgba(124,77,255,0.15);
}

.subject{
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:12px;
  margin-bottom:12px;
}

input{
  background:#040820;
  border:1px solid rgba(124,77,255,0.2);
  border-radius:14px;
  padding:12px;
  color:var(--text);
  font-size:15px;
  outline:none;
}

input:focus{
  border-color:var(--accent);
  box-shadow:var(--glow);
}

button{
  background:linear-gradient(135deg,var(--accent),var(--hover));
  border:none;
  border-radius:16px;
  padding:12px 18px;
  font-size:15px;
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 10px 30px rgba(124,77,255,0.45);
}

button:hover{
  transform:scale(1.06);
  box-shadow:0 0 35px rgba(33,150,243,0.7);
}

.remove{
  background:#ff1744;
  box-shadow:0 0 20px rgba(255,23,68,0.5);
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:15px;
}

.resultBox{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
}

.gpa{
  font-size:6rem;
  font-weight:700;
  background:linear-gradient(90deg,#7c4dff,#00c6ff,#00ffcc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 40px rgba(124,77,255,0.6);
}

.label{
  font-size:1.2rem;
  color:var(--muted);
}

.rank{
  margin-top:12px;
  font-size:1.4rem;
  font-weight:600;
  letter-spacing:1px;
}

.progress{
  width:100%;
  height:14px;
  background:#1a1f55;
  border-radius:14px;
  overflow:hidden;
  margin-top:18px;
}

.progress span{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--hover));
  box-shadow:var(--glow);
  transition:0.6s;
}

@media(max-width:850px){
  .grid{grid-template-columns:1fr;}
  .gpa{font-size:4.5rem;}
}
.pb-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #ffffff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 35px rgba(124, 58, 237, 0.45);
  transition: all 0.35s ease;
}

/* Hover → Blue */
.pb-btn:hover {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  box-shadow: 0 12px 40px rgba(56, 189, 248, 0.6);
  transform: translateY(-2px);
}

/* Click */
.pb-btn:active {
  transform: scale(0.97);
}
</style>
</head>
<a class="pb-btn" href="index2.html">← Back</a>

<body>

<div class="app">
  <h1>⚡ GPA SCORE ESTIMATOR — GOD MODE</h1>

  <div class="grid">
    <div class="card">
      <h3>Enter Subjects</h3>
      <div id="subjects"></div>

      <div class="controls">
        <button onclick="addSubject()">➕ Add Subject</button>
        <button onclick="calculate()">🔥 Calculate GPA</button>
        <button onclick="resetAll()">♻ Reset</button>
      </div>
    </div>

    <div class="card resultBox">
      <div class="gpa" id="gpa">0.0</div>
      <div class="label">Estimated GPA (out of 10)</div>
      <div class="rank" id="rank">---</div>
      <div class="progress">
        <span id="bar"></span>
      </div>
    </div>
  </div>
</div>

<script>
const subjects=document.getElementById("subjects");

function addSubject(){
  const div=document.createElement("div");
  div.className="subject";
  div.innerHTML=`
    <input placeholder="Subject">
    <input type="number" placeholder="Marks">
    <input type="number" placeholder="Total">
    <button class="remove" onclick="this.parentElement.remove()">✖</button>
  `;
  subjects.appendChild(div);
}

addSubject(); addSubject();

function calculate(){
  let totalMarks=0, totalObtained=0;

  document.querySelectorAll(".subject").forEach(row=>{
    const inputs=row.querySelectorAll("input");
    const m=parseFloat(inputs[1].value)||0;
    const t=parseFloat(inputs[2].value)||0;
    totalObtained+=m;
    totalMarks+=t;
  });

  if(totalMarks===0) return;

  const percent=(totalObtained/totalMarks)*100;
  let gpa=(percent/100)*10;
  gpa=Math.min(10,Math.max(0,gpa));

  document.getElementById("gpa").innerText=gpa.toFixed(2);
  document.getElementById("bar").style.width=(gpa*10)+"%";

  let rank="BEGINNER";
  if(gpa>=9.5) rank="🔥 LEGEND 🔥";
  else if(gpa>=9) rank="⚡ ELITE ⚡";
  else if(gpa>=8) rank="💎 PRO 💎";
  else if(gpa>=7) rank="🚀 ADVANCED";
  else if(gpa>=6) rank="📘 INTERMEDIATE";
  else if(gpa>=5) rank="📗 BASIC";
  else rank="⚠ NEEDS WORK";

  document.getElementById("rank").innerText=rank;
}

function resetAll(){
  subjects.innerHTML="";
  addSubject(); addSubject();
  document.getElementById("gpa").innerText="0.0";
  document.getElementById("rank").innerText="---";
  document.getElementById("bar").style.width="0%";
}
</script>

</body>
</html>
