<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Percentage Calculator</title>

<style>
:root{
  --bg:#070b16;
  --card:#10162b;
  --accent:#7c4dff;
  --hover:#2196f3;
  --text:#e8eaf6;
  --muted:#9aa0c7;
}

*{box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

body{
  margin:0;
  background:radial-gradient(circle at top,#11183a,#05070f);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.card{
  background:rgba(16,22,43,0.9);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:25px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 45px rgba(0,0,0,0.5);
  text-align:center;
}

h1{
  font-weight:600;
  letter-spacing:0.5px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #1f2450;
  background:#070b16;
  color:var(--text);
  font-size:16px;
  outline:none;
  margin-bottom:12px;
}

input:focus{border-color:var(--accent);}

button{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--hover));
  color:white;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.03);}

.result{
  margin-top:20px;
  font-size:32px;
  font-weight:600;
}

.progress{
  margin-top:15px;
  height:10px;
  background:#1f2450;
  border-radius:10px;
  overflow:hidden;
}

.progress span{
  display:block;
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--hover));
  width:0%;
  transition:0.5s;
}

</style>
</head>

<body>

<div class="card">
  <h1>📊 Percentage Calculator</h1>

  <input type="number" id="obtained" placeholder="Marks Obtained">
  <input type="number" id="total" placeholder="Total Marks">

  <button onclick="calculate()">Calculate Percentage</button>

  <div class="result" id="result">0%</div>

  <div class="progress">
    <span id="bar"></span>
  </div>
</div>

<script>
function calculate(){
  const obtained=parseFloat(document.getElementById("obtained").value)||0;
  const total=parseFloat(document.getElementById("total").value)||0;

  if(total===0) return;

  const percent=(obtained/total)*100;
  document.getElementById("result").innerText=percent.toFixed(2)+"%";
  document.getElementById("bar").style.width=Math.min(percent,100)+"%";
}
</script>

</body>
</html>
