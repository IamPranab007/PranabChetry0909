<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spaced Repetition Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.06);
  --purple:#7c3aed;
  --blue:#38bdf8;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

*{box-sizing:border-box;font-family:system-ui}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#1e1b4b,var(--bg));
  color:var(--text);
  padding:24px;
}

.container{max-width:900px;margin:auto}

h1{
  font-size:2.5rem;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{color:var(--muted);margin-bottom:25px}

.card{
  background:var(--card);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 40px rgba(0,0,0,.45);
}

input{
  width:100%;
  background:#020617;
  border:1px solid rgba(255,255,255,.1);
  color:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}

button{
  margin-top:14px;
  padding:12px 22px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:white;
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}

button:hover{transform:translateY(-2px)}

.task{
  border-left:4px solid var(--purple);
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 12px;
  border-radius:999px;
  font-size:.8rem;
  background:rgba(124,58,237,.2);
  color:#c4b5fd;
}
/* Purple → Blue Premium Button */
.pb-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #ffffff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 35px rgba(124, 58, 237, 0.45);
  transition: all 0.35s ease;
}

/* Hover → Blue */
.pb-btn:hover {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  box-shadow: 0 12px 40px rgba(56, 189, 248, 0.6);
  transform: translateY(-2px);
}

/* Click */
.pb-btn:active {
  transform: scale(0.97);
}

</style>
</head>

<body>
    <a class="pb-btn" href="index2.html">← Back</a>
<div class="container">
  <h1>Spaced Repetition Planner</h1>
  <p class="subtitle">Review smarter, not harder.</p>

  <!-- ADD TOPIC -->
  <div class="card">
    <input id="topic" placeholder="Enter topic (e.g. Laws of Motion)">
    <button onclick="addTopic()">Add Topic</button>
  </div>

  <!-- TODAY'S TASKS -->
  <div class="card">
    <strong>Today's Revisions</strong>
    <div id="today"></div>
  </div>

  <!-- ALL TOPICS -->
  <div class="card">
    <strong>All Topics</strong>
    <div id="all"></div>
  </div>
</div>

<script>
let topics = JSON.parse(localStorage.getItem("spaced")) || [];

function save(){
  localStorage.setItem("spaced", JSON.stringify(topics));
}

function addTopic(){
  if(!topic.value) return;

  topics.push({
    name: topic.value,
    level: 0,
    next: Date.now()
  });

  topic.value="";
  save();
  render();
}

function review(i){
  topics[i].level++;

  // Spaced intervals (in days)
  const gaps = [1, 3, 7, 14, 30];
  let days = gaps[Math.min(topics[i].level, gaps.length-1)];

  topics[i].next = Date.now() + days*24*60*60*1000;

  save();
  render();
}

function render(){
  today.innerHTML="";
  all.innerHTML="";

  const now = Date.now();

  topics.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="card task";
    div.innerHTML=`
      <strong>${t.name}</strong><br>
      <span class="badge">Level ${t.level}</span><br>
      <button onclick="review(${i})">Mark Reviewed</button>
    `;

    if(t.next <= now){
      today.appendChild(div);
    }

    all.appendChild(div.cloneNode(true));
  });
}

render();
</script>
</body>
</html>
