<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Revision Tracker - Student Toolkit</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        h1, h2, h3 {
            color: #c084fc; /* Purple */
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        /* Glassmorphism Cards */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        /* Form Styles */
        .add-task-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input, select, button {
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        input, select {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        input::placeholder {
            color: #b0b0b0;
        }
        button {
            background: #c084fc; /* Purple */
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #3b82f6; /* Blue */
            transform: scale(1.05);
        }

        /* Task List */
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        .task-item.completed {
            background: rgba(59, 130, 246, 0.2); /* Blue tint */
            text-decoration: line-through;
            opacity: 0.7;
        }
        .task-details {
            flex: 1;
        }
        .task-details strong {
            color: #c084fc;
        }
        .complete-btn {
            background: #10b981; /* Green for complete */
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .complete-btn:hover {
            background: #059669;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c084fc, #3b82f6);
            transition: width 0.5s ease;
        }

        /* Streak */
        .streak {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .streak span {
            color: #3b82f6;
            font-weight: bold;
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            color: #b0b0b0;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .add-task-form {
                flex-direction: column;
            }
            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .complete-btn {
                align-self: flex-end;
                margin-top: 0.5rem;
            }
        }

        button{
  margin-top:14px;
  padding:12px 22px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:white;
  cursor:pointer;
  font-weight:500;
  transition:.25s;
}

button:hover{transform:translateY(-2px)}

.task{
  border-left:4px solid var(--purple);
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 12px;
  border-radius:999px;
  font-size:.8rem;
  background:rgba(124,58,237,.2);
  color:#c4b5fd;
}
/* Purple → Blue Premium Button */
.pb-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #ffffff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 35px rgba(124, 58, 237, 0.45);
  transition: all 0.35s ease;
}

/* Hover → Blue */
.pb-btn:hover {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  box-shadow: 0 12px 40px rgba(56, 189, 248, 0.6);
  transform: translateY(-2px);
}

/* Click */
.pb-btn:active {
  transform: scale(0.97);
}
    </style>
</head>
<body>
    <h1>Daily Revision Tracker</h1>
    <a class="pb-btn" href="index2.html">← Back</a>
    <div class="card">
        <h2>Today's Revision Tasks</h2>
        <div class="streak">Current Streak: <span id="streak-count">0</span> days</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
        </div>
        <p id="progress-text">0 / 0 tasks completed</p>
        <form class="add-task-form" id="add-task-form">
            <input type="text" id="task-topic" placeholder="Enter topic (e.g., Algebra)" required>
            <select id="task-subject" required>
                <option value="">Select Subject</option>
                <option value="Maths">Maths</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="History">History</option>
                <option value="Geography">Geography</option>
                <option value="English">English</option>
                <option value="Other">Other</option>
            </select>
            <button type="submit">Add Task</button>
        </form>
        <ul class="task-list" id="task-list">
            <!-- Tasks will be added here -->
        </ul>
        <div class="empty-state" id="empty-today">No tasks added yet. Add your first revision task above!</div>
    </div>

    <div class="card">
        <h2>Completed Today</h2>
        <ul class="task-list" id="completed-list">
            <!-- Completed tasks will be added here -->
        </ul>
        <div class="empty-state" id="empty-completed">No tasks completed yet. Mark some tasks as done!</div>
    </div>

    <div class="card">
        <h2>Revision History</h2>
        <div id="history">
            <!-- History will be added here -->
        </div>
        <div class="empty-state" id="empty-history">No history yet. Complete tasks to build your streak!</div>
    </div>

    <script>
        // Data structure: { date: 'YYYY-MM-DD', tasks: [{ topic, subject, completed }], streak: number }
        let data = JSON.parse(localStorage.getItem('revisionTracker')) || { date: new Date().toISOString().split('T')[0], tasks: [], streak: 0 };
        let today = new Date().toISOString().split('T')[0];

        // Check for date change and reset
        if (data.date !== today) {
            // Move today's tasks to history if any were completed
            if (data.tasks.some(t => t.completed)) {
                data.history = data.history || [];
                data.history.push({ date: data.date, tasks: data.tasks });
            }
            // Reset streak if not all tasks were completed
            if (!data.tasks.every(t => t.completed) && data.tasks.length > 0) {
                data.streak = 0;
            }
            // Reset for new day
            data.tasks = [];
            data.date = today;
            saveData();
        }

        // Load UI
        function loadUI() {
            const taskList = document.getElementById('task-list');
            const completedList = document.getElementById('completed-list');
            const historyDiv = document.getElementById('history');
            taskList.innerHTML = '';
            completedList.innerHTML = '';
            historyDiv.innerHTML = '';

            data.tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.completed ? ' completed' : '');
                li.innerHTML = `
                    <div class="task-details">
                        <strong>${task.topic}</strong> - ${task.subject}
                    </div>
                    ${!task.completed ? `<button class="complete-btn" onclick="completeTask(${index})">Complete</button>` : ''}
                `;
                if (task.completed) {
                    completedList.appendChild(li);
                } else {
                    taskList.appendChild(li);
                }
            });

            // History
            if (data.history) {
                data.history.forEach(day => {
                    const dayDiv = document.createElement('div');
                    dayDiv.innerHTML = `<h3>${day.date}</h3><ul class="task-list">${day.tasks.map(t => `<li class="task-item completed"><div class="task-details"><strong>${t.topic}</strong> - ${t.subject}</div></li>`).join('')}</ul>`;
                    historyDiv.appendChild(dayDiv);
                });
            }

            // Update progress
            const completed = data.tasks.filter(t => t.completed).length;
            const total = data.tasks.length;
            document.getElementById('progress-fill').style.width = total > 0 ? (completed / total * 100) + '%' : '0%';
            document.getElementById('progress-text').textContent = `${completed} / ${total} tasks completed`;
            document.getElementById('streak-count').textContent = data.streak;

            // Empty states
            document.getElementById('empty-today').style.display = total === 0 ? 'block' : 'none';
            document.getElementById('empty-completed').style.display = completed === 0 ? 'block' : 'none';
            document.getElementById('empty-history').style.display = (!data.history || data.history.length === 0) ? 'block' : 'none';
        }

        // Add task
        document.getElementById('add-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const topic = document.getElementById('task-topic').value.trim();
            const subject = document.getElementById('task-subject').value;
            if (topic && subject) {
                data.tasks.push({ topic, subject, completed: false });
                saveData();
                loadUI();
                document.getElementById('task-topic').value = '';
                document.getElementById('task-subject').value = '';
            }
        });

        // Complete task
        function completeTask(index) {
            data.tasks[index].completed = true;
            // Check if all tasks are completed to update streak
            if (data.tasks.every(t => t.completed)) {
                data.streak++;
            }
            saveData();
            loadUI();
        }

        // Save data
        function saveData() {
            localStorage.setItem('revisionTracker', JSON.stringify(data));
        }

        // Initial load
        loadUI();
    </script>
</body>
</html>
